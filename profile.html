<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0e1a">
    <title>Chegg - Player Profile</title>
    <link rel="icon" type="image/png" href="egg.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="Minecraft-CSS/dist/minecraft-css-framework-v-1.0.0.css">
    
    <!-- Game Styles -->
    <link rel="stylesheet" href="styles/game.css">
</head>
<body style="padding: clamp(12px, 3vw, 24px);">
    <div style="max-width: 1200px; margin: 0 auto;">
        <a href="leaderboard.html" style="display: inline-flex; align-items: center; gap: 8px; margin-bottom: 20px; padding: 10px 20px; background: var(--bg-card); border: 2px solid var(--border); border-radius: 8px; color: var(--text-secondary); text-decoration: none; font-weight: 600; transition: all var(--transition-smooth); font-size: 0.9rem;">
            <span>←</span>
            <span>Back to Leaderboard</span>
        </a>
        
        <input type="text" id="usernameSearch" class="search-box" placeholder="Enter username to view profile..." style="width: 100%; max-width: 500px; margin-bottom: 24px; padding: 14px 20px; background: var(--bg-card); border: 2px solid var(--border); border-radius: 12px; color: var(--text-primary); font-family: 'Inter', sans-serif; font-size: 1rem; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);">

        <div id="profileContent" style="display: none;">
            <div style="background: var(--bg-card); border: 2px solid var(--border); border-radius: 16px; padding: clamp(20px, 4vw, 40px); margin-bottom: 24px; box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);">
                <div style="display: flex; align-items: center; gap: 24px; flex-wrap: wrap; margin-bottom: 24px;">
                    <div id="profileRank" style="flex-shrink: 0;"></div>
                    <div style="flex: 1; min-width: 200px;">
                        <div id="profileUsername" style="font-size: clamp(1.8rem, 5vw, 3rem); color: var(--text-primary); font-weight: 800; margin-bottom: 8px; text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);">-</div>
                        <div style="color: var(--text-secondary); font-size: clamp(0.9rem, 2vw, 1.1rem); font-weight: 500;">Player Profile</div>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px;">
                    <div class="stat-card">
                        <div class="stat-value" id="statElo">-</div>
                        <div class="stat-label">ELO Rating</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statRank">-</div>
                        <div class="stat-label">Global Rank</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statWins">-</div>
                        <div class="stat-label">Wins</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statLosses">-</div>
                        <div class="stat-label">Losses</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statWinRate">-</div>
                        <div class="stat-label">Win Rate</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statGames">-</div>
                        <div class="stat-label">Total Games</div>
                    </div>
                </div>
            </div>

            <div style="background: var(--bg-card); border: 2px solid var(--border); border-radius: 16px; padding: clamp(20px, 4vw, 32px); margin-bottom: 24px; box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);">
                <div id="matchHistoryTitle" style="font-size: clamp(1.3rem, 3vw, 1.8rem); color: var(--text-primary); font-weight: 700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--border);">Match History</div>
                <div id="matchHistory" style="display: flex; flex-direction: column; gap: 12px;">
                    <div class="loading">Loading match history...</div>
                </div>
            </div>
        </div>

        <div id="loadingMessage" class="loading">Enter a username to view their profile</div>
        <div id="errorMessage" class="error" style="display: none;"></div>
    </div>

    <script type="module">
        import { RankSystem } from './js/ui/RankSystem.js';
        import { API_URL } from './js/config.js';

        const rankSystem = new RankSystem();
        let searchTimeout = null;

        async function init() {
            await rankSystem.load();
            
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('username');
            
            if (username) {
                document.getElementById('usernameSearch').value = username;
                await loadProfile(username);
            }
        }

        document.getElementById('usernameSearch').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const username = e.target.value.trim();
                if (username) {
                    loadProfile(username);
                    history.pushState(null, '', '?username=' + encodeURIComponent(username));
                } else {
                    document.getElementById('profileContent').style.display = 'none';
                    document.getElementById('loadingMessage').style.display = 'block';
                    document.getElementById('errorMessage').style.display = 'none';
                }
            }, 500);
        });

        async function loadProfile(username) {
            document.getElementById('loadingMessage').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('profileContent').style.display = 'none';

            try {
                const response = await fetch(`${API_URL}/player/${encodeURIComponent(username)}`);
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || 'Player not found');
                }

                displayProfile(data.player);
                await loadMatchHistory(username);

                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('profileContent').style.display = 'block';
            } catch (err) {
                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('errorMessage').textContent = err.message;
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        function displayProfile(player) {
            const rankColor = player.rank <= 3 ? '#a855f7' : rankSystem.getRankColor(player.elo);
            
            const usernameEl = document.getElementById('profileUsername');
            usernameEl.textContent = player.username;
            usernameEl.style.color = rankColor;
            
            const matchHistoryTitle = document.getElementById('matchHistoryTitle');
            matchHistoryTitle.style.color = rankColor;
            
            document.getElementById('statElo').textContent = player.elo;
            document.getElementById('statRank').textContent = '#' + player.rank;
            document.getElementById('statWins').textContent = player.wins;
            document.getElementById('statLosses').textContent = player.losses;
            document.getElementById('statGames').textContent = player.games;

            const winRate = player.games > 0 ? ((player.wins / player.games) * 100).toFixed(1) : '0.0';
            document.getElementById('statWinRate').textContent = winRate + '%';

            const rankDiv = document.getElementById('profileRank');
            if (rankSystem.loaded) {
                // Only show eye icon for players in The End tier (4000+ ELO)
                if (player.elo >= 4000) {
                    rankDiv.innerHTML = '<div style="display: inline-flex; align-items: center; justify-content: center;"><img src="assets/leaderboard/eye.png" alt="The Eye" style="width: clamp(48px, 10vw, 80px); height: clamp(48px, 10vw, 80px); image-rendering: pixelated;"></div>';
                } else {
                    const rankHTML = rankSystem.getRankHTML(player.elo, { size: 64, showName: false });
                    rankDiv.innerHTML = rankHTML;
                }
            }
            
            window.currentPlayerRankColor = rankColor;
        }

        async function loadMatchHistory(username) {
            const historyDiv = document.getElementById('matchHistory');
            
            try {
                const response = await fetch(`${API_URL}/player/${encodeURIComponent(username)}/matches`);
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || 'Failed to load match history');
                }

                if (data.matches.length === 0) {
                    historyDiv.innerHTML = '<div class="loading">No matches found</div>';
                    return;
                }

                historyDiv.innerHTML = '';
                
                data.matches.forEach(match => {
                    const matchCard = document.createElement('div');
                    const rankColor = window.currentPlayerRankColor || 'var(--mana-color)';
                    matchCard.style.cssText = 'background: var(--bg-panel); border: 2px solid var(--border); border-radius: 12px; padding: 16px; display: flex; justify-content: space-between; align-items: center; gap: 16px; transition: all var(--transition-smooth);';
                    matchCard.style.borderLeft = match.result === 'win' ? '4px solid ' + rankColor : '4px solid var(--player-red)';

                    const matchInfo = document.createElement('div');
                    matchInfo.style.cssText = 'flex: 1; min-width: 0;';

                    const opponent = document.createElement('div');
                    opponent.style.cssText = 'font-size: clamp(1rem, 2.5vw, 1.3rem); color: var(--text-primary); font-weight: 600; margin-bottom: 6px;';
                    opponent.textContent = 'vs ' + match.opponent;
                    matchInfo.appendChild(opponent);

                    const details = document.createElement('div');
                    details.style.cssText = 'color: var(--text-secondary); font-size: clamp(0.75rem, 2vw, 0.9rem);';
                    const date = new Date(match.timestamp);
                    details.textContent = match.turns + ' turns • ' + date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
                    matchInfo.appendChild(details);

                    const result = document.createElement('div');
                    result.style.cssText = 'font-size: clamp(1rem, 2.5vw, 1.3rem); font-weight: 800; padding: 10px 20px; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0;';
                    if (match.result === 'win') {
                        result.style.cssText += 'color: ' + rankColor + '; background: rgba(' + hexToRgb(rankColor) + ', 0.15); border: 2px solid rgba(' + hexToRgb(rankColor) + ', 0.3);';
                        result.textContent = 'WIN';
                    } else {
                        result.style.cssText += 'color: var(--player-red); background: rgba(239, 68, 68, 0.15); border: 2px solid rgba(239, 68, 68, 0.3);';
                        result.textContent = 'LOSS';
                    }

                    matchCard.appendChild(matchInfo);
                    matchCard.appendChild(result);

                    historyDiv.appendChild(matchCard);
                });
            } catch (err) {
                historyDiv.innerHTML = '<div class="error">Failed to load match history: ' + err.message + '</div>';
            }
        }
        
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? 
                parseInt(result[1], 16) + ', ' + parseInt(result[2], 16) + ', ' + parseInt(result[3], 16) :
                '139, 92, 246';
        }

        init();
    </script>
</body>
</html>
