<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0e1a">
    <title>Chegg Leaderboard</title>
    <link rel="icon" type="image/png" href="egg.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Game Styles -->
    <link rel="stylesheet" href="styles/game.css">
    
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            padding: clamp(12px, 3vw, 24px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            transition: all var(--transition-smooth);
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: var(--bg-panel);
            border-color: var(--text-muted);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        h1 {
            text-align: center;
            color: var(--text-primary);
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        h1 img {
            width: clamp(32px, 6vw, 48px);
            height: clamp(32px, 6vw, 48px);
            image-rendering: pixelated;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            font-weight: 500;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            padding: 12px 20px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all var(--transition-smooth);
        }

        .search-box:focus {
            outline: none;
            border-color: var(--mana-color);
            background: var(--bg-panel);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .search-box::placeholder {
            color: var(--text-muted);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all var(--transition-smooth);
        }

        .stat-card:hover {
            border-color: var(--mana-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
        }

        .stat-value {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            color: var(--mana-color);
            font-weight: 800;
            text-shadow: 0 0 12px rgba(139, 92, 246, 0.5);
        }

        .stat-label {
            color: var(--text-secondary);
            margin-top: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table-container {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--bg-panel);
        }

        th {
            padding: 16px;
            text-align: left;
            color: var(--mana-color);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        tbody tr {
            transition: background var(--transition-fast);
        }

        tbody tr:hover {
            background: var(--bg-panel);
        }

        .rank-cell {
            font-weight: 700;
            color: var(--mana-color);
        }

        .rank-cell.top-3 {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rank-cell.top-3 img {
            width: 24px;
            height: 24px;
            image-rendering: pixelated;
        }

        .loading, .error {
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
        }

        .loading {
            color: var(--text-secondary);
        }

        .error {
            color: var(--player-red);
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .rank-badge img {
            width: 24px;
            height: 24px;
            image-rendering: pixelated;
        }

        a {
            color: var(--player-blue);
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        a:hover {
            color: var(--player-blue-light);
        }

        @media (max-width: 768px) {
            table {
                font-size: 0.85rem;
            }

            th, td {
                padding: 10px 8px;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">
            <span>⬅</span>
            <span>Back to Game</span>
        </a>
        
        <h1 style="color: #f5f0a7">
            <img src="assets/leaderboard/end.png" alt="End Icon">
            Leaderboard
        </h1>
        <div class="subtitle">Top Players by ELO Rating</div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalPlayers">-</div>
                <div class="stat-label">Total Players</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgElo">-</div>
                <div class="stat-label">Average ELO</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="topElo">-</div>
                <div class="stat-label">Highest ELO</div>
            </div>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" class="search-box" placeholder="Search by username...">
            <button class="action-btn primary" onclick="loadLeaderboard()">Refresh</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Username</th>
                        <th>Tier</th>
                        <th>ELO</th>
                        <th>Wins</th>
                        <th>Losses</th>
                        <th>Win Rate</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr>
                        <td colspan="7" class="loading">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { RankSystem } from './js/ui/RankSystem.js';
        import { API_URL } from './js/config.js';

        const rankSystem = new RankSystem();
        let allPlayers = [];
        let searchTimeout = null;

        async function init() {
            await rankSystem.load();
            console.log('RankSystem loaded:', rankSystem.loaded);
            await loadLeaderboard();
        }

        async function loadLeaderboard() {
            try {
                const response = await fetch(`${API_URL}/leaderboard?limit=100`);
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error || 'Failed to load leaderboard');
                }
                
                allPlayers = data.players;
                updateStats(data);
                renderLeaderboard(allPlayers);
            } catch (err) {
                console.error('Error loading leaderboard:', err);
                document.getElementById('leaderboardBody').innerHTML = 
                    '<tr><td colspan="7" class="error">Failed to load leaderboard. Make sure your internet connection is working.</td></tr>';
            }
        }

        function updateStats(data) {
            const players = data.players || [];
            const totalPlayers = data.total || 0;
            
            document.getElementById('totalPlayers').textContent = totalPlayers;
            
            if (players.length > 0) {
                const avgElo = players.reduce((sum, p) => sum + p.elo, 0) / players.length;
                document.getElementById('avgElo').textContent = Math.round(avgElo);
                document.getElementById('topElo').textContent = players[0].elo;
            } else {
                document.getElementById('avgElo').textContent = 0;
                document.getElementById('topElo').textContent = 0;
            }
        }

        function renderLeaderboard(players) {
            const tbody = document.getElementById('leaderboardBody');
            
            if (players.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="loading">No players found</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            
            players.forEach((player, index) => {
                const tr = document.createElement('tr');
                
                const globalRank = allPlayers.findIndex(p => p.username === player.username) + 1;
                
                const rankTd = document.createElement('td');
                rankTd.className = 'rank-cell';
                rankTd.textContent = '#' + globalRank;
                tr.appendChild(rankTd);
                
                const usernameTd = document.createElement('td');
                const usernameLink = document.createElement('a');
                usernameLink.href = `profile.html?username=${encodeURIComponent(player.username)}`;
                usernameLink.textContent = player.username;
                usernameTd.appendChild(usernameLink);
                tr.appendChild(usernameTd);
                
                const tierTd = document.createElement('td');
                if (rankSystem.loaded) {
                    if (globalRank <= 3) {
                        // Show eye icon for top 3, but only show "The Eye" text if they're in The End tier (4000+ ELO)
                        const eyeBadge = document.createElement('div');
                        eyeBadge.className = 'rank-badge';
                        eyeBadge.style.display = 'inline-flex';
                        eyeBadge.style.alignItems = 'center';
                        eyeBadge.style.gap = '8px';
                        
                        const eyeImg = document.createElement('img');
                        eyeImg.src = 'assets/leaderboard/eye.png';
                        eyeImg.alt = 'The Eye';
                        eyeImg.style.width = '24px';
                        eyeImg.style.height = '24px';
                        eyeImg.style.imageRendering = 'pixelated';
                        eyeBadge.appendChild(eyeImg);
                        
                        // Only show "The Eye" text if player is in The End tier (4000+ ELO)
                        if (player.elo >= 4000) {
                            const nameSpan = document.createElement('span');
                            nameSpan.textContent = 'The Eye';
                            nameSpan.style.color = '#a855f7';
                            nameSpan.style.fontWeight = 'bold';
                            eyeBadge.appendChild(nameSpan);
                        } else {
                            // Show their actual rank name
                            const rankName = rankSystem.getRankName(player.elo);
                            const rankColor = rankSystem.getRankColor(player.elo);
                            const nameSpan = document.createElement('span');
                            nameSpan.textContent = rankName;
                            nameSpan.style.color = rankColor;
                            nameSpan.style.fontWeight = 'bold';
                            eyeBadge.appendChild(nameSpan);
                        }
                        
                        tierTd.appendChild(eyeBadge);
                    } else {
                        const rankHTML = rankSystem.getRankHTML(player.elo, { size: 24 });
                        tierTd.innerHTML = rankHTML;
                    }
                } else {
                    tierTd.textContent = '-';
                }
                tr.appendChild(tierTd);
                
                const eloTd = document.createElement('td');
                eloTd.textContent = player.elo;
                tr.appendChild(eloTd);
                
                const winsTd = document.createElement('td');
                winsTd.textContent = player.wins || 0;
                tr.appendChild(winsTd);
                
                const lossesTd = document.createElement('td');
                lossesTd.textContent = player.losses || 0;
                tr.appendChild(lossesTd);
                
                const totalGames = (player.wins || 0) + (player.losses || 0);
                const winRate = totalGames > 0 ? ((player.wins || 0) / totalGames * 100).toFixed(1) : '0.0';
                const winRateTd = document.createElement('td');
                winRateTd.textContent = winRate + '%';
                tr.appendChild(winRateTd);
                
                tbody.appendChild(tr);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const query = e.target.value.toLowerCase().trim();
                
                if (query === '') {
                    renderLeaderboard(allPlayers);
                } else {
                    const filtered = allPlayers.filter(p => 
                        p.username.toLowerCase().includes(query)
                    );
                    renderLeaderboard(filtered);
                }
            }, 300);
        });

        window.loadLeaderboard = loadLeaderboard;

        init();
    </script>
</body>
</html>
