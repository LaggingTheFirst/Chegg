<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0e1a">
    <title>Tournament Admin - Chegg</title>
    <link rel="icon" type="image/png" href="egg.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="Minecraft-CSS/dist/minecraft-css-framework-v-1.0.0.css">
    
    <link rel="stylesheet" href="styles/game.css">
</head>
<body style="padding: clamp(12px, 3vw, 24px); background: var(--bg-dark); color: var(--text-primary); font-family: 'Inter', sans-serif;">
    <div class="container">
        <!-- Header -->
        <div style="margin-bottom: 24px;">
            <a href="admin.html" style="display: inline-flex; align-items: center; gap: 8px; margin-bottom: 12px; padding: 10px 20px; background: var(--bg-card); border: 2px solid var(--border); border-radius: 0px;">
                <span>←</span>
                <span>Back to Admin</span>
            </a>
            <h1 style="color: var(--player-red); font-size: clamp(2rem, 6vw, 3rem); font-weight: 800; margin: 12px 0 8px 0; text-shadow: 0 2px 8px rgba(239, 68, 68, 0.5);">Tournament Admin</h1>
            <p style="color: var(--text-secondary); margin: 0;">Create and manage tournaments</p>
        </div>

        <!-- Create Tournament Card -->
        <div style="background: var(--bg-card); border: 2px solid var(--border); border-radius: 0px;">
            <h2 style="margin: 0 0 20px 0; font-size: 1.5rem; color: var(--text-primary);">Create New Tournament</h2>
            
            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 6px; color: var(--text-secondary); font-weight: 600; font-size: 0.85rem;">Tournament Name</label>
                <input type="text" id="name" placeholder="Weekly Championship" style="width: 100%; padding: 12px; background: var(--bg-panel); border: 2px solid var(--border); border-radius: 0px;">
            </div>
            
            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 6px; color: var(--text-secondary); font-weight: 600; font-size: 0.85rem;">Description</label>
                <textarea id="description" placeholder="Join us for an exciting tournament..." style="width: 100%; padding: 12px; background: var(--bg-panel); border: 2px solid var(--border); border-radius: 0px;"></textarea>
            </div>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px;">
                <div>
                    <label style="display: block; margin-bottom: 6px; color: var(--text-secondary); font-weight: 600; font-size: 0.85rem;">Rounds</label>
                    <input type="number" id="rounds" value="5" min="1" max="10" style="width: 100%; padding: 12px; background: var(--bg-panel); border: 2px solid var(--border); border-radius: 0px;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 6px; color: var(--text-secondary); font-weight: 600; font-size: 0.85rem;">Time Control (seconds)</label>
                    <input type="number" id="timeControl" value="900" min="60" step="60" style="width: 100%; padding: 12px; background: var(--bg-panel); border: 2px solid var(--border); border-radius: 0px;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 6px; color: var(--text-secondary); font-weight: 600; font-size: 0.85rem;">Scheduled Start</label>
                    <input type="datetime-local" id="scheduledStart" style="width: 100%; padding: 12px; background: var(--bg-panel); border: 2px solid var(--border); border-radius: 0px;">
                </div>
            </div>
            
            <button class="action-btn primary" onclick="createTournament()" style="width: 100%; padding: 14px;">Create Tournament</button>
        </div>

        <!-- Tournaments List -->
        <div style="background: var(--bg-card); border: 2px solid var(--border); border-radius: 0px;">
            <h2 style="margin: 0 0 20px 0; font-size: 1.5rem; color: var(--text-primary);">Manage Tournaments</h2>
            <div id="tournaments-list">
                <div class="loading" style="text-align: center; padding: 40px; color: var(--text-secondary);">Loading tournaments...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { API_URL } from './js/config.js';

        let authToken = sessionStorage.getItem('adminToken');

        if (!authToken) {
            alert('Please login through the admin panel first');
            window.location.href = 'admin.html';
        }

        async function loadTournaments() {
            try {
                const response = await fetch(`${API_URL}/tournaments`);
                const data = await response.json();
                
                if (!data.success) throw new Error(data.error);
                
                const list = document.getElementById('tournaments-list');
                
                if (data.tournaments.length === 0) {
                    list.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">No tournaments created yet</div>';
                    return;
                }
                
                list.innerHTML = data.tournaments.map(t => {
                    const statusColors = {
                        registration: { bg: 'rgba(34, 197, 94, 0.15)', border: 'rgba(34, 197, 94, 0.3)', text: '#22c55e' },
                        active: { bg: 'rgba(139, 92, 246, 0.15)', border: 'rgba(139, 92, 246, 0.3)', text: 'var(--mana-color)' },
                        completed: { bg: 'rgba(100, 116, 139, 0.15)', border: 'rgba(100, 116, 139, 0.3)', text: '#64748b' }
                    };
                    const colors = statusColors[t.status] || statusColors.registration;
                    
                    return `
                        <div style="background: var(--bg-panel); border: 2px solid var(--border); border-radius: 0px;">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 12px; flex-wrap: wrap;">
                                <div style="flex: 1; min-width: 250px;">
                                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap;">
                                        <h3 style="margin: 0; font-size: 1.2rem; color: var(--text-primary);">${t.name}</h3>
                                        <span style="display: inline-block; padding: 4px 12px; border-radius: 0px;">${t.status}</span>
                                    </div>
                                    <div style="color: var(--text-secondary); font-size: 0.9rem;">
                                        ${t.participants} players • Round ${t.currentRound}/${t.rounds} • Created ${new Date(t.createdAt).toLocaleDateString()}
                                    </div>
                                </div>
                                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                                    <a href="tournament.html?id=${t.id}" class="action-btn secondary" style="padding: 8px 16px; font-size: 0.85rem; text-decoration: none; display: inline-block;">View</a>
                                    ${t.status === 'registration' ? `
                                        <button class="action-btn primary" onclick="startTournament('${t.id}')" style="padding: 8px 16px; font-size: 0.85rem;">Start</button>
                                    ` : ''}
                                    ${t.status === 'active' ? `
                                        <button class="action-btn primary" onclick="advanceRound('${t.id}')" style="padding: 8px 16px; font-size: 0.85rem;">Next Round</button>
                                    ` : ''}
                                    <button class="action-btn danger" onclick="deleteTournament('${t.id}')" style="padding: 8px 16px; font-size: 0.85rem;">Delete</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('Load error:', err);
                document.getElementById('tournaments-list').innerHTML = 
                    '<div style="text-align: center; padding: 40px; color: var(--player-red);">Failed to load tournaments</div>';
            }
        }

        window.createTournament = async function() {
            const name = document.getElementById('name').value.trim();
            const description = document.getElementById('description').value.trim();
            const rounds = parseInt(document.getElementById('rounds').value);
            const timeControl = parseInt(document.getElementById('timeControl').value);
            const scheduledStartInput = document.getElementById('scheduledStart').value;
            
            if (!name) {
                alert('Please enter a tournament name');
                return;
            }
            
            const scheduledStart = scheduledStartInput ? new Date(scheduledStartInput).getTime() : null;
            
            try {
                const response = await fetch(`${API_URL}/tournament/create`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + authToken
                    },
                    body: JSON.stringify({ name, description, rounds, timeControl, scheduledStart })
                });
                
                const data = await response.json();
                
                if (!data.success) {
                    if (response.status === 401 || response.status === 403) {
                        alert('Session expired. Please login again.');
                        window.location.href = 'admin.html';
                        return;
                    }
                    throw new Error(data.error);
                }
                
                alert('Tournament created successfully!');
                document.getElementById('name').value = '';
                document.getElementById('description').value = '';
                document.getElementById('scheduledStart').value = '';
                loadTournaments();
            } catch (err) {
                alert('Failed to create tournament: ' + err.message);
            }
        };

        window.startTournament = async function(tournamentId) {
            if (!confirm('Start this tournament now? Players will be able to join their matches.')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/tournament/${tournamentId}/start`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + authToken
                    }
                });
                
                const data = await response.json();
                if (!data.success) throw new Error(data.error);
                
                alert('Tournament started! Round 1 pairings generated.');
                loadTournaments();
            } catch (err) {
                alert('Failed to start tournament: ' + err.message);
            }
        };

        window.advanceRound = async function(tournamentId) {
            if (!confirm('Advance to the next round? Make sure all current matches are complete.')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/tournament/${tournamentId}/advance`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + authToken
                    }
                });
                
                const data = await response.json();
                if (!data.success) throw new Error(data.error);
                
                alert('Advanced to next round!');
                loadTournaments();
            } catch (err) {
                alert('Failed to advance round: ' + err.message);
            }
        };

        window.deleteTournament = async function(tournamentId) {
            if (!confirm('Delete this tournament? This action cannot be undone.')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/tournament/${tournamentId}`, {
                    method: 'DELETE',
                    headers: { 
                        'Authorization': 'Bearer ' + authToken
                    }
                });
                
                const data = await response.json();
                if (!data.success) throw new Error(data.error);
                
                alert('Tournament deleted');
                loadTournaments();
            } catch (err) {
                alert('Failed to delete tournament: ' + err.message);
            }
        };

        loadTournaments();
    </script>
</body>
</html>
