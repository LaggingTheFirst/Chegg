<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description"
        content="CHEGG - A turn-based deck-building strategy game. Build your deck, spawn minions, and defeat your opponent's Villager!">
    <meta name="theme-color" content="#0a0e1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>CHEGG</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="Minecraft-CSS/dist/minecraft-css-framework-v-1.0.0.css">
    
    <!-- Game Styles -->
    <link rel="stylesheet" href="styles/game.css">

    <link rel="icon" type="image/png" href="./egg.png">


    <style>
        #deck-load-select {
            background: var(--bg-secondary);
            color: black;
        }

        #deck-load-select option {
            background: var(--bg-secondary);
            color: black;
        }

        /* Preloader */
        .preloader {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0a0e1a 0%, #141824 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .preloader.hidden {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        .preloader-logo {
            font-size: clamp(2.5rem, 10vw, 4rem);
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 6px;
            animation: pulse-logo 2s infinite;
            text-shadow: 0 0 40px rgba(139, 92, 246, 0.5);
        }

        @keyframes pulse-logo {
            0%, 100% { 
                transform: scale(1);
                filter: brightness(1);
            }
            50% { 
                transform: scale(1.05);
                filter: brightness(1.2);
            }
        }

        .preloader-text {
            color: #94a3b8;
            margin-top: 24px;
            font-size: clamp(0.8rem, 2vw, 1rem);
            font-weight: 500;
            letter-spacing: 1px;
        }

        .preloader-spinner {
            width: 48px;
            height: 48px;
            margin-top: 32px;
            border: 4px solid #2a3142;
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>

<body>
    <!-- Preloader -->
    <div class="preloader" id="preloader">
        <div class="preloader-logo">CHEGG</div>
        <div class="preloader-text">Loading game...</div>
        <div class="preloader-spinner"></div>
    </div>

    <!-- Main Game Container -->
    <div class="game-container" id="game-container"></div>

    <!-- Game Script (ES Module) -->
    <script type="module">
        import CheggGame from './js/main.js';

        // Hide preloader when game is ready
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('preloader').classList.add('hidden');
            }, 500);
        });
    </script>

    <!-- Fallback for browsers without ES modules -->
    <noscript>
        <div style="text-align: center; padding: 50px; color: white; background: #0a0a0f; min-height: 100vh;">
            <h1 style="color: #ef4444;">JavaScript Required</h1>
            <p style="color: #9ca3af; margin-top: 20px;">
                CHEGG requires JavaScript to run. Please enable JavaScript in your browser settings.
            </p>
        </div>
    </noscript>
</body>

</html>
